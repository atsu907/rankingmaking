<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>勉強時間ランキング作成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            padding: 12px;
            -webkit-text-size-adjust: 100%;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 4px;
            font-size: 1.2em;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            font-size: 0.75em;
            margin-bottom: 12px;
        }
        .section {
            background: #fff;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
            font-size: 0.85em;
        }
        textarea {
            width: 100%;
            height: 200px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.8em;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            resize: vertical;
            transition: border 0.2s;
            -webkit-appearance: none;
        }
        textarea:focus {
            outline: none;
            border-color: #5a67d8;
        }
        .file-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .file-btn {
            width: auto;
            padding: 10px 16px;
            background: #edf2f7;
            color: #2d3748;
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        .file-btn:active {
            background: #e2e8f0;
        }
        .file-name {
            font-size: 0.75em;
            color: #718096;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .marker-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .marker-row input[type="text"] {
            padding: 8px 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.85em;
            width: 120px;
            -webkit-appearance: none;
            background: #fff;
        }
        .marker-row input[type="text"]:focus {
            outline: none;
            border-color: #5a67d8;
        }
        .marker-row span {
            font-size: 0.75em;
            color: #718096;
        }
        .marker-saved {
            font-size: 0.7em;
            color: #48bb78;
            display: none;
        }
        .date-select {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .date-select input[type="date"] {
            padding: 8px 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.8em;
            -webkit-appearance: none;
            background: #fff;
            width: 130px;
        }
        .date-select input[type="date"]:focus {
            outline: none;
            border-color: #5a67d8;
        }
        .date-select input[type="time"] {
            padding: 8px 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.8em;
            -webkit-appearance: none;
            background: #fff;
            width: 100px;
        }
        .date-select input[type="time"]:focus {
            outline: none;
            border-color: #5a67d8;
        }
        .date-select span {
            font-size: 0.75em;
            color: #718096;
        }
        .filter-info {
            font-size: 0.7em;
            color: #5a67d8;
            margin-top: 4px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .options label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 400;
            cursor: pointer;
            font-size: 0.8em;
            background: #f7fafc;
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
        }
        .options label:has(input:checked) {
            background: #ebf4ff;
            border-color: #5a67d8;
        }
        .options input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #5a67d8;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #5a67d8;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            background: #4c51bf;
            transform: scale(0.98);
        }
        .result-area {
            background: #1a202c;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 14px;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            font-size: 0.8em;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 50px;
            line-height: 1.5;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .result-header label {
            margin-bottom: 0;
        }
        .copy-btn {
            background: #4a5568;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 0.75em;
            cursor: pointer;
            width: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .copy-btn:active {
            background: #5a67d8;
        }
        .error {
            color: #e53e3e;
            font-size: 0.75em;
            margin-top: 4px;
        }
        .count-info {
            text-align: right;
            color: #a0aec0;
            font-size: 0.7em;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>勉強時間ランキング作成</h1>
        <p class="subtitle">LINEのチャット履歴からランキングを自動生成</p>

        <div class="section">
            <label for="chatInput">チャット履歴</label>
            <div class="file-row">
                <label class="file-btn" for="fileInput">ファイルを開く</label>
                <input type="file" id="fileInput" accept=".txt" style="display:none" onchange="loadFile()">
                <span class="file-name" id="fileName">未選択</span>
            </div>

            <div class="marker-row">
                <span>時間の目印:</span>
                <input type="text" id="markerInput" placeholder="例: $ # ! S" maxlength="10">
                <span class="marker-saved" id="markerSaved">保存済</span>
            </div>

            <textarea id="chatInput" placeholder="ここにチャット履歴を貼り付けるか、ファイルを開いてください"></textarea>
            <p class="count-info" id="charCount">0文字</p>

            <div class="date-select">
                <span>開始:</span>
                <input type="date" id="startDate">
                <input type="time" id="startTime" value="12:00">
                <span>終了:</span>
                <input type="date" id="endDate">
                <input type="time" id="endTime" value="23:59">
            </div>
            <p class="filter-info" id="filterInfo"></p>

            <div class="options">
                <label><input type="checkbox" id="optAt" checked> @をつける</label>
                <label><input type="checkbox" id="optHmin" checked> h/min表記</label>
                <label><input type="checkbox" id="optShowNoReport" checked> 報告なし表示</label>
            </div>

            <button onclick="generateRanking()">ランキングを作成</button>
        </div>

        <div class="section">
            <div class="result-header">
                <label>生成結果</label>
                <button class="copy-btn" onclick="copyResult()">コピー</button>
            </div>
            <div class="result-area" id="resultArea">
                ここにランキングが表示されます
            </div>
            <p class="error" id="errorMsg"></p>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'study_marker';

        // 保存された目印を読み込む
        function loadMarker() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                document.getElementById('markerInput').value = saved;
            }
        }

        // 目印を保存する
        function saveMarker() {
            const marker = document.getElementById('markerInput').value.trim();
            if (marker) {
                localStorage.setItem(STORAGE_KEY, marker);
                const el = document.getElementById('markerSaved');
                el.style.display = 'inline';
                setTimeout(() => { el.style.display = 'none'; }, 2000);
            } else {
                localStorage.removeItem(STORAGE_KEY);
                const el = document.getElementById('markerSaved');
                el.style.display = 'inline';
                el.textContent = '解除済';
                el.style.color = '#a0aec0';
                setTimeout(() => {
                    el.style.display = 'none';
                    el.textContent = '保存済';
                    el.style.color = '#48bb78';
                }, 2000);
            }
        }

        document.getElementById('markerInput').addEventListener('input', saveMarker);
        loadMarker();

        function setToday() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const todayStr = yyyy + '-' + mm + '-' + dd;
            document.getElementById('startDate').value = todayStr;
            document.getElementById('endDate').value = todayStr;
        }
        setToday();

        function loadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;

            document.getElementById('fileName').textContent = file.name;

            const dateMatch = file.name.match(/(\d{4})[-_.]?(\d{2})[-_.]?(\d{2})/);
            if (dateMatch) {
                const extractedDate = dateMatch[1] + '-' + dateMatch[2] + '-' + dateMatch[3];
                document.getElementById('startDate').value = extractedDate;
                document.getElementById('endDate').value = extractedDate;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                document.getElementById('chatInput').value = text;
                updateCharCount();
            };
            reader.readAsText(file, 'UTF-8');
        }

        function updateCharCount() {
            const count = document.getElementById('chatInput').value.length;
            document.getElementById('charCount').textContent = count + '文字';
        }

        document.getElementById('chatInput').addEventListener('input', updateCharCount);

        function parseDateStr(str) {
            const patterns = [
                /(\d{4})[.\/\-](\d{1,2})[.\/\-](\d{1,2})/,
                /(\d{1,2})[.\/\-](\d{1,2})/,
            ];

            for (const p of patterns) {
                const m = str.match(p);
                if (m) {
                    if (m.length === 4) {
                        return {
                            year: parseInt(m[1]),
                            month: parseInt(m[2]),
                            day: parseInt(m[3])
                        };
                    } else if (m.length === 3) {
                        const now = new Date();
                        return {
                            year: now.getFullYear(),
                            month: parseInt(m[1]),
                            day: parseInt(m[2])
                        };
                    }
                }
            }
            return null;
        }

        function parseTimeToMinutes(str) {
            str = str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
            const kanjiNum = { '一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'百':100 };

            let match = str.match(/([一二三四五六七八九十百]+)時間([一二三四五六七八九十]+)分/);
            if (match) {
                let h = 0;
                let m = 0;
                const hStr = match[1];
                const mStr = match[2];
                if (hStr === '十') h = 10;
                else if (hStr.length === 2 && hStr[0] === '十') h = 10 + (kanjiNum[hStr[1]] || 0);
                else h = kanjiNum[hStr] || 0;

                if (mStr === '十') m = 10;
                else if (mStr.length === 2 && mStr[0] === '十') m = 10 + (kanjiNum[mStr[1]] || 0);
                else m = kanjiNum[mStr] || 0;
                return h * 60 + m;
            }
            match = str.match(/([一二三四五六七八九十百]+)時間/);
            if (match) {
                const hStr = match[1];
                let h = 0;
                if (hStr === '十') h = 10;
                else if (hStr.length === 2 && hStr[0] === '十') h = 10 + (kanjiNum[hStr[1]] || 0);
                else h = kanjiNum[hStr] || 0;
                return h * 60;
            }
            match = str.match(/([一二三四五六七八九十]+)分/);
            if (match) {
                const mStr = match[1];
                let m = 0;
                if (mStr === '十') m = 10;
                else if (mStr.length === 2 && mStr[0] === '十') m = 10 + (kanjiNum[mStr[1]] || 0);
                else m = kanjiNum[mStr] || 0;
                return m;
            }

            let totalMinutes = 0;
            const combPatterns = [
                /(\d+)\s*時間\s*(\d+)\s*分/,
                /(\d+)\s*h\s*(\d+)\s*min/i,
            ];
            for (const p of combPatterns) {
                const m = str.match(p);
                if (m && m[1] && m[2]) {
                    return parseInt(m[1]) * 60 + parseInt(m[2]);
                }
            }
            const halfMatch = str.match(/(\d+)\s*時間半/);
            if (halfMatch) {
                return parseInt(halfMatch[1]) * 60 + 30;
            }

            const hourMatch = str.match(/(\d+)\s*時間|\s(\d+)\s*h/i);
            const minMatch = str.match(/(\d+)\s*分|\s(\d+)\s*min/i);

            if (hourMatch) {
                const h = parseInt(hourMatch[1] || hourMatch[2]);
                totalMinutes += h * 60;
            }
            if (minMatch) {
                const m = parseInt(minMatch[1] || minMatch[2]);
                totalMinutes += m;
            }
            if (totalMinutes > 0) return totalMinutes;

            const decimalHour = str.match(/(\d+\.?\d*)\s*h/i);
            if (decimalHour) {
                return Math.round(parseFloat(decimalHour[1]) * 60);
            }

            return null;
        }

        // 目印の後ろにある時間だけを抽出
        function extractStudyTimeWithMarker(text, marker) {
            let normalized = text.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));

            if (!marker) {
                // 目印なし → 従来通り全体から探す
                return parseTimeToMinutes(normalized);
            }

            // 目印をエスケープ（正規表現の特殊文字対策）
            const escaped = marker.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(escaped + '\\s*(.+?)(?:[。、\\n]|$)', 'g');

            // 目印の後ろの部分だけを探す
            let totalMinutes = 0;
            let found = false;
            let match;
            while ((match = regex.exec(normalized)) !== null) {
                const afterMarker = match[1].trim();
                const minutes = parseTimeToMinutes(afterMarker);
                if (minutes !== null) {
                    totalMinutes += minutes;
                    found = true;
                }
            }

            if (found) return totalMinutes;
            return null;
        }

        function parseChat(input) {
            const lines = input.split('\n');
            const messages = [];
            let currentDate = null;

            const dateLinePattern = /^(\d{4}[.\/\-]\d{1,2}[.\/\-]\d{1,2}|\d{1,2}[.\/\-]\d{1,2})/;
            const timeLinePattern = /^(\d{1,2}:\d{2})\s+(.+?)\s+(.*)$/;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const dateMatch = line.match(dateLinePattern);
                const timeMatch = line.match(timeLinePattern);

                if (dateMatch && !timeMatch) {
                    const parsed = parseDateStr(line);
                    if (parsed) {
                        currentDate = parsed.year + '/' +
                            String(parsed.month).padStart(2, '0') + '/' +
                            String(parsed.day).padStart(2, '0');
                    }
                    continue;
                }

                if (timeMatch) {
                    messages.push({
                        time: timeMatch[1],
                        name: timeMatch[2].trim(),
                        text: timeMatch[3].trim(),
                        date: currentDate
                    });
                } else {
                    if (messages.length > 0) {
                        messages[messages.length - 1].text += ' ' + line;
                    }
                }
            }
            return messages;
        }

        function getDateTime(dateStr, timeStr) {
            const [y, m, d] = dateStr.split('-').map(Number);
            const [h, min] = timeStr.split(':').map(Number);
            return new Date(y, m - 1, d, h, min, 0);
        }

        function filterByRange(messages, startDateTime, endDateTime) {
            return messages.filter(msg => {
                if (msg.date) {
                    const parts = msg.date.split('/');
                    const [h, m] = msg.time.split(':').map(Number);
                    const msgDateTime = new Date(
                        parseInt(parts[0]),
                        parseInt(parts[1]) - 1,
                        parseInt(parts[2]),
                        h, m, 0
                    );
                    return msgDateTime >= startDateTime && msgDateTime <= endDateTime;
                }

                const startDay = startDateTime.toDateString();
                const endDay = endDateTime.toDateString();
                if (startDay === endDay) {
                    const [h, m] = msg.time.split(':').map(Number);
                    const msgMinutes = h * 60 + m;
                    const startMinutes = startDateTime.getHours() * 60 + startDateTime.getMinutes();
                    const endMinutes = endDateTime.getHours() * 60 + endDateTime.getMinutes();
                    return msgMinutes >= startMinutes && msgMinutes <= endMinutes;
                }

                return false;
            });
        }

        function generateRanking() {
            const input = document.getElementById('chatInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const resultArea = document.getElementById('resultArea');
            const filterInfo = document.getElementById('filterInfo');
            errorMsg.textContent = '';
            errorMsg.style.color = '#e53e3e';

            if (!input) {
                errorMsg.textContent = 'チャット履歴を入力またはファイルを読み込んでください。';
                resultArea.textContent = 'ここにランキングが表示されます';
                filterInfo.textContent = '';
                return;
            }

            const startDate = document.getElementById('startDate').value;
            const startTime = document.getElementById('startTime').value;
            const endDate = document.getElementById('endDate').value;
            const endTime = document.getElementById('endTime').value;

            if (!startDate || !endDate) {
                errorMsg.textContent = '開始日と終了日を設定してください。';
                return;
            }

            const startDateTime = getDateTime(startDate, startTime);
            const endDateTime = getDateTime(endDate, endTime);

            if (startDateTime > endDateTime) {
                errorMsg.textContent = '開始日時が終了日時より後になっています。';
                return;
            }

            let messages = parseChat(input);
            if (messages.length === 0) {
                errorMsg.textContent = '"時刻 名前 本文"の形式で入力してください。';
                filterInfo.textContent = '';
                return;
            }

            const beforeCount = messages.length;
            messages = filterByRange(messages, startDateTime, endDateTime);
            const afterCount = messages.length;

            if (messages.length === 0) {
                errorMsg.textContent = '指定期間内のデータが見つかりませんでした。（全体' + beforeCount + '件中0件）';
                resultArea.textContent = 'ここにランキングが表示されます';
                filterInfo.textContent = '';
                return;
            }

            const formatDate = (d) => {
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                const hh = String(d.getHours()).padStart(2, '0');
                const min = String(d.getMinutes()).padStart(2, '0');
                return mm + '/' + dd + ' ' + hh + ':' + min;
            };

            const marker = document.getElementById('markerInput').value.trim();

            let infoText = formatDate(startDateTime) + ' 〜 ' + formatDate(endDateTime) + ' (' + afterCount + '件)';
            if (marker) {
                infoText += ' 目印: ' + marker;
            }
            filterInfo.textContent = infoText;

            const userMessages = {};
            for (const msg of messages) {
                if (!userMessages[msg.name]) {
                    userMessages[msg.name] = [];
                }
                userMessages[msg.name].push(msg.text);
            }

            const optAt = document.getElementById('optAt').checked;
            const optHmin = document.getElementById('optHmin').checked;
            const optShowNoReport = document.getElementById('optShowNoReport').checked;

            const userStudyTimes = [];
            for (const [name, texts] of Object.entries(userMessages)) {
                const combinedText = texts.join(' ');
                const minutes = extractStudyTimeWithMarker(combinedText, marker);
                userStudyTimes.push({ name, minutes });
            }

            const withTime = userStudyTimes.filter(u => u.minutes !== null);
            const withoutTime = userStudyTimes.filter(u => u.minutes === null);

            withTime.sort((a, b) => b.minutes - a.minutes);

            const lines = [];
            lines.push('勉強時間ランキング');

            let rank = 1;
            for (const user of withTime) {
                const prefix = optAt ? '@' : '';
                const nameDisplay = prefix + user.name;
                let timeDisplay;
                if (optHmin) {
                    const h = Math.floor(user.minutes / 60);
                    const m = user.minutes % 60;
                    timeDisplay = h + 'h' + m + 'min';
                } else {
                    const h = Math.floor(user.minutes / 60);
                    const m = user.minutes % 60;
                    if (h > 0 && m > 0) timeDisplay = h + '時間' + m + '分';
                    else if (h > 0) timeDisplay = h + '時間';
                    else timeDisplay = m + '分';
                }
                lines.push(rank + '位 ' + nameDisplay + ' ' + timeDisplay);
                rank++;
            }

            if (optShowNoReport && withoutTime.length > 0) {
                const noReportNames = withoutTime.map(u => (optAt ? '@' : '') + u.name).join(' ');
                lines.push('※' + noReportNames + ' 報告なし');
            }

            resultArea.textContent = lines.join('\n');
            errorMsg.textContent = '';
        }

        function copyResult() {
            const resultArea = document.getElementById('resultArea');
            const text = resultArea.textContent;
            if (text === 'ここにランキングが表示されます') {
                document.getElementById('errorMsg').textContent = '先にランキングを作成してください。';
                document.getElementById('errorMsg').style.color = '#e53e3e';
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                const original = btn.textContent;
                btn.textContent = 'コピー完了';
                btn.style.background = '#48bb78';
                setTimeout(() => {
                    btn.textContent = original;
                    btn.style.background = '#4a5568';
                }, 1500);
            }).catch(() => {
                document.getElementById('errorMsg').textContent = 'コピーに失敗しました。手動でコピーしてください。';
                document.getElementById('errorMsg').style.color = '#e53e3e';
            });
        }

        updateCharCount();
    </script>
</body>
</html>
