<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>勉強時間ランキング作成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            padding: 12px;
            -webkit-text-size-adjust: 100%;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 4px;
            font-size: 1.2em;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            font-size: 0.75em;
            margin-bottom: 12px;
        }
        .section {
            background: #fff;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
            font-size: 0.85em;
        }
        textarea {
            width: 100%;
            height: 200px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.8em;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            resize: vertical;
            transition: border 0.2s;
            -webkit-appearance: none;
        }
        textarea:focus {
            outline: none;
            border-color: #5a67d8;
        }
        .file-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .file-btn {
            width: auto;
            padding: 10px 16px;
            background: #edf2f7;
            color: #2d3748;
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        .file-btn:active {
            background: #e2e8f0;
        }
        .file-name {
            font-size: 0.75em;
            color: #718096;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .marker-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .marker-row input[type="text"] {
            padding: 8px 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.85em;
            width: 100%;
            max-width: 300px;
            -webkit-appearance: none;
            background: #fff;
        }
        .marker-row input[type="text"]:focus {
            outline: none;
            border-color: #5a67d8;
        }
        .marker-row span {
            font-size: 0.75em;
            color: #718096;
            white-space: nowrap;
        }
        .marker-saved {
            font-size: 0.7em;
            color: #48bb78;
            display: none;
            white-space: nowrap;
        }
        .marker-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .marker-tag {
            display: inline-block;
            background: #ebf4ff;
            color: #5a67d8;
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 0.75em;
            border: 1px solid #c3dafe;
        }
        .marker-hint {
            font-size: 0.65em;
            color: #a0aec0;
            margin-top: 4px;
        }
        .date-select {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .date-select .date-group {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .date-select input[type="date"] {
            padding: 8px 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.8em;
            -webkit-appearance: none;
            background: #fff;
            width: 130px;
            min-width: 130px;
        }
        .date-select input[type="date"]:focus {
            outline: none;
            border-color: #5a67d8;
        }
        .date-select input[type="time"] {
            padding: 8px 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.8em;
            -webkit-appearance: none;
            background: #fff;
            width: 100px;
            min-width: 100px;
        }
        .date-select input[type="time"]:focus {
            outline: none;
            border-color: #5a67d8;
        }
        .date-select .date-label {
            font-size: 0.75em;
            color: #718096;
            white-space: nowrap;
        }
        .filter-info {
            font-size: 0.7em;
            color: #5a67d8;
            margin-top: 4px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .options label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 400;
            cursor: pointer;
            font-size: 0.8em;
            background: #f7fafc;
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
        }
        .options label:has(input:checked) {
            background: #ebf4ff;
            border-color: #5a67d8;
        }
        .options input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #5a67d8;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #5a67d8;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            background: #4c51bf;
            transform: scale(0.98);
        }
        .result-area {
            background: #1a202c;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 14px;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            font-size: 0.8em;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 50px;
            line-height: 1.5;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .result-header label {
            margin-bottom: 0;
        }
        .copy-btn {
            background: #4a5568;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 0.75em;
            cursor: pointer;
            width: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .copy-btn:active {
            background: #5a67d8;
        }
        .error {
            color: #e53e3e;
            font-size: 0.75em;
            margin-top: 4px;
        }
        .count-info {
            text-align: right;
            color: #a0aec0;
            font-size: 0.7em;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>勉強時間ランキング作成</h1>
        <p class="subtitle">LINEのチャット履歴からランキングを自動生成</p>

        <div class="section">
            <label for="chatInput">チャット履歴</label>
            <div class="file-row">
                <label class="file-btn" for="fileInput">ファイルを開く</label>
                <input type="file" id="fileInput" accept=".txt" style="display:none" onchange="loadFile()">
                <span class="file-name" id="fileName">未選択</span>
            </div>

            <div class="marker-row">
                <span>時間の目印:</span>
                <input type="text" id="markerInput" placeholder="例: 勉強時間報告" maxlength="200">
                <span class="marker-saved" id="markerSaved">保存済</span>
            </div>
            <div class="marker-tags" id="markerTags"></div>
            <p class="marker-hint">スペース・カンマ・改行で区切って複数指定可。目印の直後にある時間だけを拾います</p>

            <textarea id="chatInput" placeholder="ここにチャット履歴を貼り付けるか、ファイルを開いてください"></textarea>
            <p class="count-info" id="charCount">0文字</p>

            <div class="date-select">
                <span class="date-group">
                    <span class="date-label">開始:</span>
                    <input type="date" id="startDate">
                    <input type="time" id="startTime" value="12:00">
                </span>
                <span class="date-group">
                    <span class="date-label">終了:</span>
                    <input type="date" id="endDate">
                    <input type="time" id="endTime" value="23:59">
                </span>
            </div>
            <p class="filter-info" id="filterInfo"></p>

            <div class="options">
                <label><input type="checkbox" id="optAt" checked> @をつける</label>
                <label><input type="checkbox" id="optHmin" checked> h/min表記</label>
                <label><input type="checkbox" id="optShowNoReport" checked> 報告なし表示</label>
            </div>

            <button onclick="generateRanking()">ランキングを作成</button>
        </div>

        <div class="section">
            <div class="result-header">
                <label>生成結果</label>
                <button class="copy-btn" onclick="copyResult()">コピー</button>
            </div>
            <div class="result-area" id="resultArea">
                ここにランキングが表示されます
            </div>
            <p class="error" id="errorMsg"></p>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'study_markers_v2';
        const STREAK_START = new Date(2026, 3, 27);

        function getMarkers() {
            const raw = document.getElementById('markerInput').value.trim();
            if (!raw) return [];
            const splitPattern = /[\s　,，、\n\r]+/;
            const items = raw.split(splitPattern).filter(s => s.length > 0);
            return [...new Set(items)];
        }

        function updateMarkerTags() {
            const markers = getMarkers();
            const tagsEl = document.getElementById('markerTags');
            if (markers.length === 0) { tagsEl.innerHTML = ''; return; }
            tagsEl.innerHTML = markers.map(m => '<span class="marker-tag">' + escapeHTML(m) + '</span>').join('');
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function loadMarkers() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                document.getElementById('markerInput').value = saved;
                updateMarkerTags();
            }
        }

        function saveMarkers() {
            const raw = document.getElementById('markerInput').value.trim();
            if (raw) localStorage.setItem(STORAGE_KEY, raw);
            else localStorage.removeItem(STORAGE_KEY);
            updateMarkerTags();
            const el = document.getElementById('markerSaved');
            el.style.display = 'inline';
            if (raw) { el.textContent = '保存済'; el.style.color = '#48bb78'; }
            else { el.textContent = '解除済'; el.style.color = '#a0aec0'; }
            setTimeout(() => { el.style.display = 'none'; }, 2000);
        }

        document.getElementById('markerInput').addEventListener('input', saveMarkers);
        loadMarkers();

        function setToday() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const todayStr = yyyy + '-' + mm + '-' + dd;
            document.getElementById('startDate').value = todayStr;
            document.getElementById('endDate').value = todayStr;
        }
        setToday();

        function loadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;
            document.getElementById('fileName').textContent = file.name;
            const dateMatch = file.name.match(/(\d{4})[-_.]?(\d{2})[-_.]?(\d{2})/);
            if (dateMatch) {
                const extractedDate = dateMatch[1] + '-' + dateMatch[2] + '-' + dateMatch[3];
                document.getElementById('startDate').value = extractedDate;
                document.getElementById('endDate').value = extractedDate;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('chatInput').value = e.target.result;
                updateCharCount();
            };
            reader.readAsText(file, 'UTF-8');
        }

        function updateCharCount() {
            document.getElementById('charCount').textContent = document.getElementById('chatInput').value.length + '文字';
        }
        document.getElementById('chatInput').addEventListener('input', updateCharCount);

        function parseDateStr(str) {
            const patterns = [/(\d{4})[.\/\-](\d{1,2})[.\/\-](\d{1,2})/, /(\d{1,2})[.\/\-](\d{1,2})/];
            for (const p of patterns) {
                const m = str.match(p);
                if (m) {
                    if (m.length === 4) return { year: parseInt(m[1]), month: parseInt(m[2]), day: parseInt(m[3]) };
                    else if (m.length === 3) { const now = new Date(); return { year: now.getFullYear(), month: parseInt(m[1]), day: parseInt(m[2]) }; }
                }
            }
            return null;
        }

        function parseTimeToMinutes(str) {
            str = str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
            const kanjiNum = { '一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'百':100 };
            let match = str.match(/([一二三四五六七八九十百]+)時間([一二三四五六七八九十]+)分/);
            if (match) {
                let h = 0, m = 0;
                const hStr = match[1], mStr = match[2];
                if (hStr === '十') h = 10;
                else if (hStr.length === 2 && hStr[0] === '十') h = 10 + (kanjiNum[hStr[1]] || 0);
                else h = kanjiNum[hStr] || 0;
                if (mStr === '十') m = 10;
                else if (mStr.length === 2 && mStr[0] === '十') m = 10 + (kanjiNum[mStr[1]] || 0);
                else m = kanjiNum[mStr] || 0;
                return h * 60 + m;
            }
            match = str.match(/([一二三四五六七八九十百]+)時間/);
            if (match) {
                const hStr = match[1]; let h = 0;
                if (hStr === '十') h = 10;
                else if (hStr.length === 2 && hStr[0] === '十') h = 10 + (kanjiNum[hStr[1]] || 0);
                else h = kanjiNum[hStr] || 0;
                return h * 60;
            }
            match = str.match(/([一二三四五六七八九十]+)分/);
            if (match) {
                const mStr = match[1]; let m = 0;
                if (mStr === '十') m = 10;
                else if (mStr.length === 2 && mStr[0] === '十') m = 10 + (kanjiNum[mStr[1]] || 0);
                else m = kanjiNum[mStr] || 0;
                return m;
            }
            let totalMinutes = 0;
            const combPatterns = [/(\d+)\s*時間\s*(\d+)\s*分/, /(\d+)\s*h\s*(\d+)\s*min/i];
            for (const p of combPatterns) { const m = str.match(p); if (m && m[1] && m[2]) return parseInt(m[1]) * 60 + parseInt(m[2]); }
            const halfMatch = str.match(/(\d+)\s*時間半/);
            if (halfMatch) return parseInt(halfMatch[1]) * 60 + 30;
            const hourMatch = str.match(/(\d+)\s*時間|\s(\d+)\s*h/i);
            const minMatch = str.match(/(\d+)\s*分|\s(\d+)\s*min/i);
            if (hourMatch) totalMinutes += parseInt(hourMatch[1] || hourMatch[2]) * 60;
            if (minMatch) totalMinutes += parseInt(minMatch[1] || minMatch[2]);
            if (totalMinutes > 0) return totalMinutes;
            const decimalHour = str.match(/(\d+\.?\d*)\s*h/i);
            if (decimalHour) return Math.round(parseFloat(decimalHour[1]) * 60);
            return null;
        }

        function extractStudyTimeWithMarkers(text, markers) {
            let normalized = text.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
            if (markers.length === 0) return parseTimeToMinutes(normalized);
            let lastMinutes = null, found = false;
            for (const marker of markers) {
                const escaped = marker.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(escaped + '\\s*(.+?)(?=[。、\\n]|$)', 'g');
                let match;
                while ((match = regex.exec(normalized)) !== null) {
                    const minutes = parseTimeToMinutes(match[1].trim());
                    if (minutes !== null) { lastMinutes = minutes; found = true; }
                }
            }
            return found ? lastMinutes : null;
        }

        function hasSchool(text) {
            const patterns = [/学校\s*あり|学校\s*アリ|学校\s*有り|学校\s*があった|学校\s*行っ|登校\s*あり|登校\s*アリ/, /🏫\s*アリ|🏫\s*あり/, /学校あり|学校アリ|登校あり|登校アリ/];
            for (const p of patterns) { if (p.test(text)) return true; }
            return false;
        }

        function hasExam(text) {
            const patterns = [/受験生/];
            for (const p of patterns) { if (p.test(text)) return true; }
            return false;
        }

        function parseChat(input) {
            const lines = input.split('\n');
            const messages = [];
            let currentDate = null;
            const dateLinePattern = /^(\d{4}[.\/\-]\d{1,2}[.\/\-]\d{1,2}|\d{1,2}[.\/\-]\d{1,2})/;
            const timeLinePattern = /^(\d{1,2}:\d{2})\s+(.+?)\s+(.*)$/;
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const dateMatch = line.match(dateLinePattern);
                const timeMatch = line.match(timeLinePattern);
                if (dateMatch && !timeMatch) {
                    const parsed = parseDateStr(line);
                    if (parsed) currentDate = parsed.year + '/' + String(parsed.month).padStart(2, '0') + '/' + String(parsed.day).padStart(2, '0');
                    continue;
                }
                if (timeMatch) messages.push({ time: timeMatch[1], name: timeMatch[2].trim(), text: timeMatch[3].trim(), date: currentDate });
                else if (messages.length > 0) messages[messages.length - 1].text += ' ' + line;
            }
            return messages;
        }

        function getDateTime(dateStr, timeStr) {
            const [y, m, d] = dateStr.split('-').map(Number);
            const [h, min] = timeStr.split(':').map(Number);
            return new Date(y, m - 1, d, h, min, 0);
        }

        function filterByRange(messages, startDateTime, endDateTime) {
            return messages.filter(msg => {
                if (msg.date) {
                    const parts = msg.date.split('/');
                    const [h, m] = msg.time.split(':').map(Number);
                    const msgDateTime = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]), h, m, 0);
                    return msgDateTime >= startDateTime && msgDateTime <= endDateTime;
                }
                const startDay = startDateTime.toDateString(), endDay = endDateTime.toDateString();
                if (startDay === endDay) {
                    const [h, m] = msg.time.split(':').map(Number);
                    const msgMinutes = h * 60 + m;
                    const startMinutes = startDateTime.getHours() * 60 + startDateTime.getMinutes();
                    const endMinutes = endDateTime.getHours() * 60 + endDateTime.getMinutes();
                    return msgMinutes >= startMinutes && msgMinutes <= endMinutes;
                }
                return false;
            });
        }

        function formatTime(minutes, optHmin) {
            if (optHmin) { const h = Math.floor(minutes / 60), m = minutes % 60; return h + 'h' + m + 'min'; }
            else { const h = Math.floor(minutes / 60), m = minutes % 60; if (h > 0 && m > 0) return h + '時間' + m + '分'; else if (h > 0) return h + '時間'; else return m + '分'; }
        }

        function getDailyReporters(allMessages, markers) {
            const userMessages = {};
            for (const msg of allMessages) {
                if (!msg.date) continue;
                if (!userMessages[msg.name]) userMessages[msg.name] = {};
                if (!userMessages[msg.name][msg.date]) userMessages[msg.name][msg.date] = [];
                userMessages[msg.name][msg.date].push(msg.text);
            }
            const userDays = {};
            for (const [name, dateMap] of Object.entries(userMessages)) {
                for (const [date, texts] of Object.entries(dateMap)) {
                    const minutes = extractStudyTimeWithMarkers(texts.join(' '), markers);
                    if (minutes !== null) {
                        if (!userDays[name]) userDays[name] = new Set();
                        userDays[name].add(date);
                    }
                }
            }
            return { userDays };
        }

        function calcStreak(userDays, name, todayStr) {
            if (!userDays[name]) return 0;
            const today = new Date(todayStr);
            let streak = 0;
            for (let i = 0; i < 365; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                if (d < STREAK_START) break;
                const yyyy = d.getFullYear(), mm = String(d.getMonth() + 1).padStart(2, '0'), dd = String(d.getDate()).padStart(2, '0');
                const dateKey = yyyy + '/' + mm + '/' + dd;
                if (userDays[name].has(dateKey)) streak++;
                else if (i === 0) continue;
                else break;
            }
            return streak;
        }

        function buildRankingLines(userStudyTimes, optAt, optHmin, title, streaks) {
            const withTime = userStudyTimes.filter(u => u.minutes !== null);
            const withoutTime = userStudyTimes.filter(u => u.minutes === null);
            withTime.sort((a, b) => b.minutes - a.minutes);
            const lines = [title];
            let rank = 1;
            for (const user of withTime) {
                const prefix = optAt ? '@' : '';
                const nameDisplay = prefix + user.name;
                const timeDisplay = formatTime(user.minutes, optHmin);
                const streak = streaks[user.name] || 0;
                const streakStr = streak >= 2 ? '（' + streak + '日連続）' : '';
                lines.push(rank + '位 ' + nameDisplay + ' ' + timeDisplay + (streakStr ? ' ' + streakStr : ''));
                rank++;
            }
            if (withoutTime.length > 0) {
                const noReportNames = withoutTime.map(u => (optAt ? '@' : '') + u.name).join(' ');
                lines.push('※' + noReportNames + ' 報告なし');
            }
            return lines;
        }

        function generateRanking() {
            const input = document.getElementById('chatInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const resultArea = document.getElementById('resultArea');
            const filterInfo = document.getElementById('filterInfo');
            errorMsg.textContent = '';
            errorMsg.style.color = '#e53e3e';

            if (!input) {
                errorMsg.textContent = 'チャット履歴を入力またはファイルを読み込んでください。';
                resultArea.textContent = 'ここにランキングが表示されます';
                filterInfo.textContent = '';
                return;
            }

            const startDate = document.getElementById('startDate').value;
            const startTime = document.getElementById('startTime').value;
            const endDate = document.getElementById('endDate').value;
            const endTime = document.getElementById('endTime').value;
            if (!startDate || !endDate) { errorMsg.textContent = '開始日と終了日を設定してください。'; return; }

            const startDateTime = getDateTime(startDate, startTime);
            const endDateTime = getDateTime(endDate, endTime);
            if (startDateTime > endDateTime) { errorMsg.textContent = '開始日時が終了日時より後になっています。'; return; }

            const allMessages = parseChat(input);
            if (allMessages.length === 0) {
                errorMsg.textContent = '"時刻 名前 本文"の形式で入力してください。';
                filterInfo.textContent = '';
                return;
            }

            const markers = getMarkers();
            const { userDays } = getDailyReporters(allMessages, markers);
            const todayStr = startDate;

            const beforeCount = allMessages.length;
            const messages = filterByRange(allMessages, startDateTime, endDateTime);
            const afterCount = messages.length;

            if (messages.length === 0) {
                errorMsg.textContent = '指定期間内のデータが見つかりませんでした。（全体' + beforeCount + '件中0件）';
                resultArea.textContent = 'ここにランキングが表示されます';
                filterInfo.textContent = '';
                return;
            }

            const formatDate = (d) => {
                const mm = String(d.getMonth() + 1).padStart(2, '0'), dd = String(d.getDate()).padStart(2, '0');
                const hh = String(d.getHours()).padStart(2, '0'), min = String(d.getMinutes()).padStart(2, '0');
                return mm + '/' + dd + ' ' + hh + ':' + min;
            };

            let infoText = formatDate(startDateTime) + ' 〜 ' + formatDate(endDateTime) + ' (' + afterCount + '件)';
            if (markers.length > 0) infoText += ' 目印: ' + markers.join(' ');
            filterInfo.textContent = infoText;

            const userMessages = {};
            for (const msg of messages) {
                if (!userMessages[msg.name]) userMessages[msg.name] = [];
                userMessages[msg.name].push(msg);
            }

            const optAt = document.getElementById('optAt').checked;
            const optHmin = document.getElementById('optHmin').checked;
            const optShowNoReport = document.getElementById('optShowNoReport').checked;

            const allUserTimes = [], schoolUserTimes = [], examUserTimes = [], streaks = {};

            for (const [name, msgs] of Object.entries(userMessages)) {
                const combinedText = msgs.map(m => m.text).join(' ');
                const minutes = extractStudyTimeWithMarkers(combinedText, markers);
                const school = hasSchool(combinedText);
                const exam = hasExam(combinedText);
                const streak = calcStreak(userDays, name, todayStr);
                streaks[name] = streak;

                allUserTimes.push({ name, minutes });
                if (school) schoolUserTimes.push({ name, minutes });
                if (exam) examUserTimes.push({ name, minutes });
            }

            const allLines = buildRankingLines(allUserTimes, optAt, optHmin, '勉強時間総合ランキング', streaks);

            let resultLines = [...allLines];

            if (schoolUserTimes.length > 0) {
                resultLines.push('');
                resultLines = resultLines.concat(buildRankingLines(schoolUserTimes, optAt, optHmin, '学校ありランキング', streaks));
            }
            if (examUserTimes.length > 0) {
                resultLines.push('');
                resultLines = resultLines.concat(buildRankingLines(examUserTimes, optAt, optHmin, '受験生ランキング', streaks));
            }

            if (!optShowNoReport) resultLines = resultLines.filter(l => !l.startsWith('※'));

            resultArea.textContent = resultLines.join('\n');
            errorMsg.textContent = '';
        }

        function copyResult() {
            const resultArea = document.getElementById('resultArea');
            const text = resultArea.textContent;
            if (text === 'ここにランキングが表示されます') {
                document.getElementById('errorMsg').textContent = '先にランキングを作成してください。';
                document.getElementById('errorMsg').style.color = '#e53e3e';
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                const original = btn.textContent;
                btn.textContent = 'コピー完了';
                btn.style.background = '#48bb78';
                setTimeout(() => { btn.textContent = original; btn.style.background = '#4a5568'; }, 1500);
            }).catch(() => {
                document.getElementById('errorMsg').textContent = 'コピーに失敗しました。手動でコピーしてください。';
                document.getElementById('errorMsg').style.color = '#e53e3e';
            });
        }

        updateCharCount();
    </script>
</body>
</html>
